name: 每日8点自动更新 V2Ray 节点到 index.html

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-v2ray:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 调用 Grok API 生成 index.html
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os
          import json
          import urllib.request

          API_KEY = os.environ.get("XAI_API_KEY")
          if not API_KEY:
              print("❌ 错误：XAI_API_KEY 未设置！")
              exit(1)

          HTML_FILE = "index.html"

          system_prompt = """你是一个 V2Ray 节点采集与前端设计师。
请搜索今天最新可靠的免费 V2Ray / VLESS / VMess / Trojan / Hysteria2 订阅链接。
生成一个现代深色美观的完整 index.html（使用 Tailwind CSS CDN）。
包含标题、更新时间、搜索框、卡片布局、一键复制按钮、响应式设计。
只输出纯 HTML 代码（从 <!DOCTYPE html> 到 </html>），不要其他文字。"""

          user_prompt = f"今天是 {os.popen('date +%Y-%m-%d').read().strip()}，生成最新 V2Ray 节点页面。"

          url = "https://api.x.ai/v1/chat/completions"
          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json"
          }
          data = {
              "model": "grok-4.20-0309-non-reasoning",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt}
              ],
              "temperature": 0.3,
              "max_tokens": 10000
          }

          req = urllib.request.Request(url, data=json.dumps(data).encode("utf-8"), headers=headers, method="POST")
          with urllib.request.urlopen(req) as response:
              result = json.loads(response.read().decode("utf-8"))
              html_content = result["choices"][0]["message"]["content"].strip()

          with open(HTML_FILE, "w", encoding="utf-8") as f:
              f.write(html_content)

          os.system('git config --global user.name "Grok Bot"')
          os.system('git config --global user.email "grok@bot.com"')
          os.system(f'git add {HTML_FILE}')
          os.system(f'git commit -m "🤖 Grok 自动更新 - $(date +%Y-%m-%d)" || echo "无变化"')
          os.system('git push')

          print("✅ index.html 生成并推送成功！")
          EOF

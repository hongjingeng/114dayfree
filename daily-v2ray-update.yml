name: 每日8点自动更新 V2Ray 节点到 index.html

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-v2ray:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 调用 Grok API 生成 index.html
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os
          import json
          import urllib.request

          API_KEY = os.environ.get("XAI_API_KEY")
          if not API_KEY:
              print("❌ XAI_API_KEY 未设置")
              exit(1)

          HTML_FILE = "index.html"

          # 使用和你 curl 完全一致的 endpoint 和模型
          system_prompt = "你是一个 V2Ray 节点助手。请搜索今天最新免费的 V2Ray / VLESS / VMess / Trojan 订阅链接，生成一个简单美观的深色 HTML 页面，包含标题、更新时间、节点列表和一键复制按钮。只输出纯 HTML 代码，不要其他任何文字。"

          user_prompt = "今天是 " + os.popen('date +%Y-%m-%d').read().strip() + "，请生成 V2Ray 节点页面。"

          url = "https://api.x.ai/v1/responses"   # ← 改成和你 curl 一样的 endpoint

          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json"
          }

          data = {
              "model": "grok-4.20-reasoning",     # ← 和你 curl 一样
              "input": system_prompt + "\n\n" + user_prompt   # responses endpoint 用 input 字段
          }

          req = urllib.request.Request(url, data=json.dumps(data).encode("utf-8"), headers=headers, method="POST")

          with urllib.request.urlopen(req) as response:
              result = json.loads(response.read().decode("utf-8"))
              html_content = result.get("output", result.get("choices", [{}])[0].get("message", {}).get("content", "生成失败")).strip()

          with open(HTML_FILE, "w", encoding="utf-8") as f:
              f.write(html_content if html_content.startswith("<!DOCTYPE") else "<!DOCTYPE html><html><body>" + html_content + "</body></html>")

          os.system('git config --global user.name "Grok Bot"')
          os.system('git config --global user.email "grok@bot.com"')
          os.system(f'git add {HTML_FILE}')
          os.system(f'git commit -m "Grok 自动更新 V2Ray - $(date +%Y-%m-%d)" || echo "无变化"')
          os.system('git push')

          print("✅ index.html 已生成并推送！")
          EOF
